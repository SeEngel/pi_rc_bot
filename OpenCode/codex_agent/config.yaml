# ──────────────────────────────────────────────
#  Codex Agent — configuration
# ──────────────────────────────────────────────

# Codex agent's own OpenCode instance (separate from main agent)
opencode:
  host: "127.0.0.1"
  port: 4097
  # Per-request timeout for the AI call (max 10 minutes per job)
  request_timeout: 600

# Codex agent MCP server ports
server:
  api_port: 8012       # HTTP REST
  mcp_port: 8612       # MCP protocol  (api_port + 600)

# How many tail lines to read from each server.log
log_tail_lines: 80

# Port for the main agent's OpenCode (to hot-register tools)
main_opencode_port: 4096

log_level: "INFO"
