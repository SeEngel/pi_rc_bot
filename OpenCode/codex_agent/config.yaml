# ──────────────────────────────────────────────
#  Codex Agent — configuration
# ──────────────────────────────────────────────

# Codex agent's own OpenCode instance (separate from main agent)
opencode:
  host: "127.0.0.1"
  port: 4097
  # Per-request timeout for the AI call.  In thorough mode the AI model
  # is slow but intelligent — allow up to 10 minutes per turn.
  request_timeout: 600

# ── Thorough mode ───────────────────────────
# When enabled the codex agent uses a slower, smarter model and allows
# multi-turn conversations.  Jobs that time-out become "continuable"
# instead of "failed" — the supervisor (or a human) can resume them
# with /continue_job, carrying forward the AI session context.
thorough_mode:
  enabled: false               # toggled by main.py --thorough-codex flag
  max_turns_per_job: 3         # how many AI round-trips before giving up
  turn_timeout: 600            # seconds per individual AI turn
  verify_before_restart: true  # hash-check server.py before/after to confirm change

# Repair agent MCP server ports
server:
  api_port: 8012       # HTTP REST
  mcp_port: 8612       # MCP protocol  (api_port + 600)

# How many tail lines to read from each server.log
log_tail_lines: 80

# Port for the main agent's OpenCode (to hot-register repaired tools)
main_opencode_port: 4096

log_level: "INFO"
